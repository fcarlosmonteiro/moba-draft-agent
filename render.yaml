# Blueprint Render — ajuste nomes e defina segredos no dashboard (DRAFT_WEB_PASSWORD, OPENROUTER_API_KEY, DJANGO_SECRET_KEY).
services:
  - type: web
    name: moba-draft-agent-web
    runtime: python
    plan: free
    buildCommand: pip install -e ".[web]" && cd web && python manage.py collectstatic --noinput
    preDeployCommand: cd web && python manage.py migrate --noinput && python manage.py ensure_login_user
    startCommand: cd web && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DRAFT_WEB_USER
        value: admin
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DRAFT_WEB_PASSWORD
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
